services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_Strong_P@ssw0rd!"
      MSSQL_PID: "Developer"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Your_Strong_P@ssw0rd!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./ai-service/.env
    environment:
      MONGO_URI: "mongodb://mongodb:27017/"
      REDIS_URL: "redis://redis:6379/0"
      QDRANT_URL: "http://qdrant:6333"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./ai-service/logs:/app/logs
      - ./ai-service/data:/app/data
      - ./ai-service/models:/app/models

  backend:
    build:
      context: ./Back-end
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5261:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=AICommerce;User Id=sa;Password=Your_Strong_P@ssw0rd!;Encrypt=False;TrustServerCertificate=True;MultipleActiveResultSets=True;"
      Jwt__SecretKey: "CHANGE_ME_TO_A_LONG_SECRET_KEY_FOR_DEVELOPMENT_12345"
      Jwt__Issuer: "AI-Sales-Agent"
      Jwt__Audience: "AI-Sales-Agent"
    depends_on:
      sqlserver:
        condition: service_healthy

  frontend:
    build:
      context: ./Front-end
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
      - ai-service

volumes:
  mongodb_data:
  redis_data:
  qdrant_data:
  sqlserver_data:
